

# Site settings
title: Sakiinlaq AB
 # this is the main title of your site
email: ahmed@sakiinlaq.se
description: >-
  Sakiinlaq AB bedriver verksamhet inom översättning, tolkning och bokutgivning mellan svenska och somaliska.

minimal_mistakes_skin: default
search: true
atom_feed: 
  hide: true

# Analytics
analytics:
  provider               : ""
  google:
    tracking_id          : 
    anonymize_ip         : true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /nyheter/page:num/
timezone: Europe/Stockholm # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Ahmed Abdulqaadir Sheikh"
  avatar : "https://pbs.twimg.com/profile_images/927280578692567042/BS5Ptp5a_400x400.jpg"
  bio    : "Grundare av Sakiinlaq AB <br>Tolk, översättare och förläggare"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "http://sakiinlaq.se"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/sakiinlaq"   

footer: {}

defaults:
# Somaliska sidor – använd main_so
  - scope:
      path: "_pages/so"
      type: pages
    values:
      nav: main_so


  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      nav: main
  - scope:
      path: "_tjanster"
      type: tjanster
    values:
      layout: single
      author_profile: false
      sidebar:
        nav: "tjanster"
  - scope:
      path: "_adeegyada"
      type: adeegyada
    values: 
      layout: single
      author_profile: fale
      sidebar:
        nav: "adeegyada"

  - scope:
      path: "_portfolio"
      type: portfolio
    values: 
      layout: splash
      author_profile: false
      share: false
  - scope:
      path: "_korbus"
      type: korbus
    values:
      layout: collection
      author_profile: false
      share: false
      sidebar: 
        nav: "korbus"
  - scope:
      type: ortagrafi
    values:
      layout: collection
      classes: wide
      author_profile: true
      sidebar:
        nav: "ortagrafi"
        
# collections:
collections:
  tjanster: 
    output: true
    permalink: /:collection/:path/
  adeegyada:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  korbus:
    output: true
    permalink: /:collection/:path/
  ortagrafi:
    output: true
    permalink: /:collection/:path/
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
